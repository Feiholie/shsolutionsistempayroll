<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holiedigitalproduct Payroll Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        :root { font-family: 'Plus Jakarta Sans', sans-serif; }
        .active-tab { background-color: #2563eb !important; color: white !important; }
        
        .loading-overlay {
            position: fixed; inset: 0; background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px); z-index: 9999; display: flex;
            align-items: center; justify-content: center;
        }

        .auth-card { animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .toast-message {
            position: fixed; bottom: 20px; right: 20px; z-index: 100;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">

    <!-- Firestore Rules Reminder (Manual Input in Firebase Console):
    match /users/{userId}/employees/{docId} {
      allow read, write: if request.auth != null && request.auth.uid == userId;
    }
    -->

    <!-- Overlay Loading -->
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 font-bold text-slate-600">Memproses...</p>
        </div>
    </div>

    <!-- Layar Auth -->
    <div id="auth-container" class="fixed inset-0 bg-slate-100 z-[60] flex items-center justify-center p-4">
        <div class="auth-card bg-white p-8 md:p-12 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-white">
            <div class="text-center mb-8">
                <div id="auth-icon-container" class="bg-blue-600 w-16 h-16 rounded-2xl text-white flex items-center justify-center mx-auto mb-4 shadow-xl shadow-blue-200">
                    <i id="auth-icon" class="fas fa-shield-alt text-3xl"></i>
                </div>
                <h2 id="auth-title" class="text-3xl font-black tracking-tighter">Holie<span class="text-blue-600">Login</span></h2>
                <p id="auth-subtitle" class="text-slate-500 text-sm font-medium mt-2">Masuk untuk mengelola payroll perusahaan Anda</p>
            </div>

            <form id="auth-form" class="space-y-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5 block">Email</label>
                    <input required type="email" id="auth-email" class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold outline-none focus:border-blue-500 transition-all" placeholder="admin@perusahaan.com">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5 block">Kata Sandi</label>
                    <input required type="password" id="auth-password" class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold outline-none focus:border-blue-500 transition-all" placeholder="••••••••">
                    <p id="pass-hint" class="text-[9px] text-slate-400 mt-1 font-medium hidden text-center italic">* Minimal 6 karakter diperlukan</p>
                </div>
                <button type="submit" id="auth-btn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase tracking-widest text-xs shadow-xl hover:bg-blue-700 active:scale-[0.98] transition-all mt-4">
                    Masuk Sekarang
                </button>
            </form>
            
            <div class="mt-8 text-center border-t pt-6 border-slate-100">
                <p id="toggle-text" class="text-slate-400 text-[10px] mb-2 font-black uppercase tracking-widest">Belum punya akun?</p>
                <button type="button" onclick="toggleAuthMode()" id="toggle-auth-btn" class="text-blue-600 font-extrabold text-sm hover:text-blue-800 transition-all bg-blue-50 hover:bg-blue-100 px-6 py-2.5 rounded-full cursor-pointer">
                    Daftar Akun Baru
                </button>
            </div>
        </div>
    </div>

    <!-- Layar Dashboard Utama -->
    <div id="main-app" class="hidden">
        <aside class="fixed left-0 top-0 h-screen w-64 bg-white border-r border-slate-200 p-6 hidden lg:flex flex-col z-40">
            <div class="flex items-center space-x-3 mb-10">
                <div class="bg-blue-600 p-2.5 rounded-xl text-white shadow-lg">
                    <i class="fas fa-layer-group text-xl"></i>
                </div>
                <h1 class="text-xl font-extrabold tracking-tight">Holie<span class="text-blue-600">Digital</span></h1>
            </div>

            <nav class="space-y-2 flex-1">
                <button onclick="switchTab('dashboard')" id="nav-dashboard" class="nav-btn active-tab flex items-center space-x-3 w-full px-4 py-3.5 rounded-xl transition-all font-bold">
                    <i class="fas fa-chart-pie w-5"></i><span>Dashboard</span>
                </button>
                <button onclick="switchTab('payroll')" id="nav-payroll" class="nav-btn text-slate-500 hover:bg-slate-100 flex items-center space-x-3 w-full px-4 py-3.5 rounded-xl transition-all font-bold">
                    <i class="fas fa-users w-5"></i><span>Karyawan</span>
                </button>
            </nav>

            <div class="mt-auto pt-6 border-t">
                <div class="p-4 bg-slate-50 rounded-2xl mb-4 overflow-hidden border border-slate-100">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">User ID</p>
                    <p id="user-email-display" class="font-bold text-slate-700 text-[10px] truncate uppercase tracking-tighter">...</p>
                </div>
                <button onclick="handleSignOut()" class="w-full bg-red-50 text-red-600 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-red-600 hover:text-white transition-all">
                    <i class="fas fa-sign-out-alt mr-2"></i> Keluar
                </button>
            </div>
        </aside>

        <main class="lg:ml-64 p-4 md:p-8">
            <header class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
                <div>
                    <h2 id="view-title" class="text-3xl font-black tracking-tighter">Dashboard</h2>
                    <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest mt-1">Holie Payroll Pro v2.0</p>
                </div>
                <button onclick="openModal()" class="bg-blue-600 text-white px-6 py-3.5 rounded-2xl font-black uppercase tracking-widest text-[10px] shadow-xl hover:bg-blue-700 transition-all flex items-center justify-center">
                    <i class="fas fa-plus mr-2 text-xs"></i> Tambah Karyawan
                </button>
            </header>

            <section id="tab-dashboard" class="tab-content space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm transition-all hover:shadow-md">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Populasi Staff</p>
                        <h3 id="stat-count" class="text-5xl font-black text-slate-900 tracking-tighter">0</h3>
                    </div>
                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm transition-all hover:shadow-md">
                        <p class="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-2">Total Pengeluaran Gaji</p>
                        <h3 id="stat-total" class="text-4xl font-black text-blue-600 tracking-tighter">Rp 0</h3>
                    </div>
                </div>
            </section>

            <section id="tab-payroll" class="tab-content hidden">
                <div class="bg-white rounded-[2rem] border border-slate-200 shadow-sm overflow-hidden overflow-x-auto">
                    <table class="w-full text-left border-collapse min-w-[700px]">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-100">
                                <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Karyawan</th>
                                <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Jabatan</th>
                                <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Gaji Bersih</th>
                                <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="employee-table-body" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { 
            getFirestore, 
            collection, 
            onSnapshot, 
            doc, 
            addDoc, 
            updateDoc, 
            deleteDoc 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Konfigurasi Firebase Anda
        const firebaseConfig = {
            apiKey: "AIzaSyDDsXTgZkvvaw3-Q3RBjQQG51i1VfxQIls",
            authDomain: "payrollshsolution-app.firebaseapp.com",
            projectId: "payrollshsolution-app",
            storageBucket: "payrollshsolution-app.firebasestorage.app",
            messagingSenderId: "610527777510",
            appId: "1:610527777510:web:9731b8557fbc2a71fce127"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let isLoginMode = true;
        let unsubscribeData = null;
        let employees = [];

        // UI Helpers
        const toggleLoading = (show) => document.getElementById('loading-overlay').classList.toggle('hidden', !show);
        
        const showToast = (message, isError = false) => {
            const toast = document.createElement('div');
            toast.className = `toast-message px-6 py-3 rounded-xl shadow-2xl font-bold text-white ${isError ? 'bg-red-500' : 'bg-green-500'}`;
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        };

        // Auth Logic
        window.toggleAuthMode = () => {
            isLoginMode = !isLoginMode;
            
            const titleEl = document.getElementById('auth-title');
            const subtitleEl = document.getElementById('auth-subtitle');
            const btnEl = document.getElementById('auth-btn');
            const toggleBtnEl = document.getElementById('toggle-auth-btn');
            const toggleTextEl = document.getElementById('toggle-text');
            const iconEl = document.getElementById('auth-icon');
            const iconContainer = document.getElementById('auth-icon-container');
            const passHint = document.getElementById('pass-hint');

            if (isLoginMode) {
                titleEl.innerHTML = 'Holie<span class="text-blue-600">Login</span>';
                subtitleEl.innerText = 'Masuk untuk mengelola payroll perusahaan Anda';
                btnEl.innerText = 'Masuk Sekarang';
                btnEl.className = 'w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase tracking-widest text-xs shadow-xl hover:bg-blue-700 active:scale-[0.98] transition-all mt-4';
                toggleBtnEl.innerText = 'Daftar Akun Baru';
                toggleTextEl.innerText = 'Belum punya akun?';
                iconEl.className = 'fas fa-shield-alt text-3xl';
                iconContainer.className = 'bg-blue-600 w-16 h-16 rounded-2xl text-white flex items-center justify-center mx-auto mb-4 shadow-xl shadow-blue-200';
                passHint.classList.add('hidden');
            } else {
                titleEl.innerHTML = 'Holie<span class="text-emerald-600">Daftar</span>';
                subtitleEl.innerText = 'Buat akun pengelola baru sekarang';
                btnEl.innerText = 'Buat Akun Sekarang';
                btnEl.className = 'w-full bg-emerald-600 text-white py-4 rounded-2xl font-black uppercase tracking-widest text-xs shadow-xl hover:bg-emerald-700 active:scale-[0.98] transition-all mt-4';
                toggleBtnEl.innerText = 'Masuk Saja';
                toggleTextEl.innerText = 'Sudah pernah mendaftar?';
                iconEl.className = 'fas fa-user-plus text-3xl';
                iconContainer.className = 'bg-emerald-500 w-16 h-16 rounded-2xl text-white flex items-center justify-center mx-auto mb-4 shadow-xl shadow-emerald-200';
                passHint.classList.remove('hidden');
            }
        };

        // CRUD Functions (Simplified Paths)
        window.openModal = async () => {
            const name = prompt("Nama karyawan:");
            if (!name) return;
            const position = prompt("Jabatan:");
            const salary = prompt("Gaji (angka saja):");
            
            const user = auth.currentUser;
            if (!user) return;

            toggleLoading(true);
            try {
                // PATH: /users/{uid}/employees
                await addDoc(collection(db, 'users', user.uid, 'employees'), {
                    name, 
                    position, 
                    salary: Number(salary) || 0, 
                    createdAt: new Date().toISOString()
                });
                showToast("Data karyawan berhasil disimpan!");
            } catch (err) {
                console.error("Firestore Save Error:", err.code, err.message);
                showToast("Gagal menyimpan data ke Firestore.", true);
            } finally { toggleLoading(false); }
        };

        window.editEmployee = async (id, currentName, currentPosition, currentSalary) => {
            const name = prompt("Edit Nama:", currentName);
            const position = prompt("Edit Jabatan:", currentPosition);
            const salary = prompt("Edit Gaji:", currentSalary);
            if (!name || !position || !salary) return;

            const user = auth.currentUser;
            if (!user) return;

            toggleLoading(true);
            try {
                // PATH: /users/{uid}/employees/{id}
                const docRef = doc(db, 'users', user.uid, 'employees', id);
                await updateDoc(docRef, { name, position, salary: Number(salary) });
                showToast("Data diperbarui.");
            } catch (err) {
                console.error("Firestore Update Error:", err.code, err.message);
                showToast("Gagal memperbarui data.", true);
            } finally { toggleLoading(false); }
        };

        window.deleteEmployee = async (id) => {
            if (!confirm("Hapus data karyawan ini?")) return;
            const user = auth.currentUser;
            if (!user) return;

            toggleLoading(true);
            try {
                // PATH: /users/{uid}/employees/{id}
                const docRef = doc(db, 'users', user.uid, 'employees', id);
                await deleteDoc(docRef);
                showToast("Data dihapus.");
            } catch (err) {
                console.error("Firestore Delete Error:", err.code, err.message);
                showToast("Gagal menghapus data.", true);
            } finally { toggleLoading(false); }
        };

        // Auth Submission
        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-password').value;
            
            toggleLoading(true);
            try {
                if (isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    if (pass.length < 6) throw { code: 'weak-password', message: 'Sandi min. 6 karakter' };
                    await createUserWithEmailAndPassword(auth, email, pass);
                }
            } catch (err) {
                // LOGGING DETAIL KE CONSOLE
                console.log("Auth Error Code:", err.code);
                console.log("Auth Error Message:", err.message);
                
                let msg = "Terjadi kesalahan.";
                if (err.code === 'auth/invalid-credential') msg = "Email atau sandi salah.";
                else if (err.code === 'auth/email-already-in-use') msg = "Email sudah digunakan.";
                else if (err.code === 'weak-password') msg = err.message;
                
                showToast(msg, true);
            } finally { toggleLoading(false); }
        });

        window.handleSignOut = async () => {
            toggleLoading(true);
            try { 
                await signOut(auth); 
                showToast("Berhasil keluar."); 
            } catch (err) { 
                console.error("SignOut Error:", err.code, err.message);
            } finally { toggleLoading(false); }
        };

        // Global State Listener (UI Switch)
        onAuthStateChanged(auth, (user) => {
            const authView = document.getElementById('auth-container');
            const appView = document.getElementById('main-app');

            if (unsubscribeData) { 
                unsubscribeData(); 
                unsubscribeData = null; 
            }

            if (user) {
                console.log("User Logged In:", user.uid);
                authView.classList.add('hidden');
                appView.classList.remove('hidden');
                document.getElementById('user-email-display').innerText = user.email;
                document.getElementById('auth-form').reset();
                initDataListener(user.uid);
            } else {
                console.log("No Active Session.");
                authView.classList.remove('hidden');
                appView.classList.add('hidden');
                employees = [];
                renderUI();
            }
        });

        const initDataListener = (uid) => {
            // Simplified Path Listener
            const colRef = collection(db, 'users', uid, 'employees');
            unsubscribeData = onSnapshot(colRef, (snapshot) => {
                employees = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderUI();
            }, (err) => {
                console.log("Firestore Snapshot Error:", err.code, err.message);
            });
        };

        // Render Helpers
        const formatIDR = (v) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(v);

        const renderUI = () => {
            const totalNet = employees.reduce((acc, emp) => acc + (Number(emp.salary) || 0), 0);
            document.getElementById('stat-count').innerText = employees.length;
            document.getElementById('stat-total').innerText = formatIDR(totalNet);
            
            const tableBody = document.getElementById('employee-table-body');
            tableBody.innerHTML = employees.map(emp => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="p-6">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl bg-blue-100 text-blue-600 flex items-center justify-center font-black text-sm uppercase">${emp.name?.charAt(0) || '?'}</div>
                            <span class="font-bold text-slate-700">${emp.name}</span>
                        </div>
                    </td>
                    <td class="p-6 text-slate-500 font-bold text-xs uppercase tracking-tight">${emp.position}</td>
                    <td class="p-6 text-right font-mono font-bold text-blue-600">${formatIDR(emp.salary)}</td>
                    <td class="p-6 text-center">
                        <div class="flex items-center justify-center gap-2">
                            <button onclick="editEmployee('${emp.id}', '${emp.name}', '${emp.position}', ${emp.salary})" class="bg-blue-50 text-blue-600 w-10 h-10 rounded-xl flex items-center justify-center hover:bg-blue-600 hover:text-white transition-all"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteEmployee('${emp.id}')" class="bg-red-50 text-red-400 w-10 h-10 rounded-xl flex items-center justify-center hover:bg-red-500 hover:text-white transition-all"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');
            
            if (employees.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="4" class="p-20 text-center">
                    <div class="flex flex-col items-center">
                        <i class="fas fa-folder-open text-slate-200 text-5xl mb-4"></i>
                        <p class="text-slate-400 font-bold uppercase tracking-widest text-[10px]">Belum ada data karyawan</p>
                    </div>
                </td></tr>`;
            }
        };

        window.switchTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(`nav-${tabId}`).classList.add('active-tab');
            document.getElementById('view-title').innerText = tabId === 'dashboard' ? 'Dashboard' : 'Karyawan';
        };

    </script>
</body>
</html>
